name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build

  audit:
    name: Security Audit (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Informational until the monero-javascript -> monero-ts migration lands
      # (see tracking issue). Flip continue-on-error to false to make this a hard gate.
      - name: Audit production dependencies (high or critical)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
