name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hard gate: block on CRITICAL advisories (currently zero after the
      # monero-ts migration). One known HIGH (serialize-javascript, a transitive
      # of monero-ts) has no upstream fix and is tracked in issue #27; tighten to
      # --audit-level=high once that is resolved upstream.
      - name: Audit production dependencies (block on critical)
        run: npm audit --omit=dev --audit-level=critical
